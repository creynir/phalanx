[defaults]
backend = ""                    # auto-detected on first run (cursor > claude > gemini > codex)
model = ""                      # empty = use role-based routing per backend

[timeouts]
agent_inactivity_minutes = 30
team_gc_hours = 24
stall_seconds = 180
max_runtime_seconds = 3600
heartbeat_interval_seconds = 20
max_retries = 3

# Model routing: role → model per backend CLI.
# Each backend can only use its own vendor's models.
# Cursor is the only backend with cross-vendor access.
# Edit these values or use: phalanx models set <backend>.<role> <model>

[models.cursor]
orchestrator = "sonnet-4.6"
coder        = "sonnet-4.6"
researcher   = "gemini-3.1-pro"
reviewer     = "gemini-3.1-pro"
architect    = "gemini-3.1-pro"
default      = "gemini-3.1-pro"

[models.claude]
orchestrator = "sonnet"
coder        = "sonnet"
researcher   = "opus"
reviewer     = "opus"
architect    = "opus"
default      = "sonnet"

[models.gemini]
orchestrator = "gemini-2.5-flash"
coder        = "gemini-2.5-pro"
researcher   = "gemini-2.5-pro"
reviewer     = "gemini-2.5-pro"
architect    = "gemini-2.5-pro"
default      = "gemini-2.5-pro"

[models.codex]
orchestrator = "gpt-5.2"
coder        = "gpt-5.3-codex"
researcher   = "gpt-5.2"
reviewer     = "gpt-5.2"
architect    = "gpt-5.2"
default      = "gpt-5.3-codex"
